<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zomato NextLeap | AI Recommendations</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --primary: #ff4757;
        --primary-hover: #ff6b81;
        --bg: #0f172a;
        --card-bg: rgba(30, 41, 59, 0.7);
        --text: #f1f5f9;
        --text-muted: #94a3b8;
        --border: rgba(255, 255, 255, 0.1);
        --accent: #38bdf8;
      }
      body {
        font-family: 'Outfit', sans-serif;
        margin: 0;
        background: var(--bg);
        background-image: 
          radial-gradient(at 0% 0%, rgba(255, 71, 87, 0.15) 0, transparent 50%),
          radial-gradient(at 100% 100%, rgba(56, 189, 248, 0.1) 0, transparent 50%);
        color: var(--text);
        min-height: 100vh;
        overflow-x: hidden;
      }
      .container {
        max-width: 1000px;
        margin: 0 auto;
        padding: 40px 20px;
      }
      header {
        text-align: center;
        margin-bottom: 40px;
      }
      h1 {
        font-size: 3rem;
        font-weight: 700;
        margin: 0;
        background: linear-gradient(to right, #ff4757, #38bdf8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: -1px;
      }
      .card {
        background: var(--card-bg);
        backdrop-filter: blur(12px);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 32px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        margin-bottom: 32px;
        transition: transform 0.3s ease, border-color 0.3s ease;
      }
      .card:hover { transform: translateY(-4px); border-color: rgba(255, 255, 255, 0.2); }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
      }
      .field { margin-bottom: 20px; }
      label {
        font-size: 0.875rem;
        font-weight: 600;
        display: block;
        margin-bottom: 8px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 14px 18px;
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid var(--border);
        border-radius: 12px;
        color: #fff;
        font-family: inherit;
        font-size: 1rem;
        transition: all 0.2s ease;
      }
      input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(255, 71, 87, 0.1);
      }
      button {
        background: var(--primary);
        color: #fff;
        border: none;
        border-radius: 12px;
        padding: 16px 28px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        width: 100%;
        box-shadow: 0 10px 15px -3px rgba(255, 71, 87, 0.3);
      }
      button:hover {
        background: var(--primary-hover);
        transform: translateY(-2px);
        box-shadow: 0 20px 25px -5px rgba(255, 71, 87, 0.4);
      }
      button:active { transform: translateY(0); }
      button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
      
      .status {
        font-size: 0.9375rem;
        margin-bottom: 24px;
        padding: 12px 20px;
        border-radius: 12px;
        text-align: center;
        animation: fadeIn 0.3s ease;
      }
      .status.loading { background: rgba(56, 189, 248, 0.1); color: var(--accent); }
      .status.error { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
      
      .rec-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 24px;
      }
      .rec-card {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 24px;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        flex-direction: column;
        animation: slideUp 0.5s ease backwards;
      }
      .rec-card:hover {
        border-color: var(--primary);
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
      }
      .rec-card h3 { margin: 0 0 8px 0; font-size: 1.25rem; font-weight: 700; }
      .rec-card .meta { font-size: 0.875rem; color: var(--text-muted); margin-bottom: 16px; }
      .pill { 
        display: inline-block; 
        background: rgba(255, 71, 87, 0.1); 
        color: var(--primary); 
        padding: 4px 12px; 
        border-radius: 999px; 
        font-size: 0.75rem; 
        font-weight: 600;
        margin: 0 4px 4px 0;
      }
      .reason {
        font-size: 0.9375rem;
        line-height: 1.6;
        color: var(--text-muted);
        border-top: 1px solid var(--border);
        margin-top: auto;
        padding-top: 16px;
      }
      
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
      
      .summary-card {
        background: linear-gradient(135deg, rgba(255, 71, 87, 0.1), rgba(56, 189, 248, 0.1));
        border: 1px solid var(--border);
        padding: 20px;
        border-radius: 16px;
        margin-bottom: 32px;
        font-weight: 600;
        text-align: center;
      }
      
      /* Auto-suggest styles */
      .suggestion-container { position: relative; }
      .suggestions {
        position: absolute;
        top: calc(100% + 4px);
        left: 0;
        right: 0;
        background: #1e293b;
        border: 1px solid var(--border);
        border-radius: 12px;
        z-index: 100;
        max-height: 200px;
        overflow-y: auto;
        display: none;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
      }
      .suggestion-item {
        padding: 12px 16px;
        cursor: pointer;
        font-size: 0.9375rem;
        transition: background 0.2s;
      }
      .suggestion-item:hover, .suggestion-item.active {
        background: rgba(255, 71, 87, 0.15);
        color: var(--primary);
      }
      .suggestion-item .match { font-weight: 700; text-decoration: underline; }
      .no-matches {
        padding: 12px 16px;
        color: var(--text-muted);
        font-size: 0.875rem;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Zomato NextLeap</h1>
        <p style="color:var(--text-muted); margin-top: 8px;">AI-Powered Premium Restaurant Recommendations</p>
      </header>

      <div class="card">
        <form id="prefForm">
          <div class="grid">
            <div class="field suggestion-container">
              <label for="price">Max Budget (₹)</label>
              <input id="price" name="price" type="number" placeholder="e.g. 1500" autocomplete="off" />
              <div id="price-suggestions" class="suggestions"></div>
            </div>
            <div class="field suggestion-container">
              <label for="place">Locality</label>
              <input id="place" name="place" type="text" placeholder="e.g. Banashankari" autocomplete="off" />
              <div id="place-suggestions" class="suggestions"></div>
            </div>
            <div class="field suggestion-container">
              <label for="rating">Min Rating</label>
              <input id="rating" name="rating" type="number" min="0" max="5" step="0.1" placeholder="e.g. 4.0" autocomplete="off" />
              <div id="rating-suggestions" class="suggestions"></div>
            </div>
            <div class="field suggestion-container">
              <label for="cuisine">Cuisines</label>
              <input id="cuisine" name="cuisine" type="text" placeholder="e.g. Italian, North Indian" autocomplete="off" />
              <div id="cuisine-suggestions" class="suggestions"></div>
            </div>
          </div>
          <div style="margin-top:10px;">
            <button id="submitBtn" type="submit">Discover Restaurants</button>
          </div>
        </form>
      </div>

      <div id="status" class="status"></div>
      <div id="results"></div>
    </div>
    <script type="module" src="./uiPage.mjs"></script>
  </body>
</html>
